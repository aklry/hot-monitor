version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hots-monitor-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - hots-network

  # Optional: RSSHub for RSS feeds
  rsshub:
    image: diygod/rsshub:latest
    container_name: hots-monitor-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - REQUEST_TIMEOUT=10000
    networks:
      - hots-network

networks:
  hots-network:
    driver: bridge
